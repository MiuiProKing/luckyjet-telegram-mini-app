name: Unpack Beta Classic HTML

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack-beta-classic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace compressed Swiftgram-incompatible wrapper
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import base64
          import gzip

          path = Path('beta-classic.html')
          if not path.exists():
              raise SystemExit('beta-classic.html not found')

          source = path.read_text(encoding='utf-8')
          if 'DecompressionStream' not in source:
              print('Beta Classic is already plain HTML')
              raise SystemExit(0)

          match = re.search(r"const b64=['\"]([A-Za-z0-9+/=]+)['\"]", source)
          if not match:
              raise SystemExit('Compressed payload not found')

          html = gzip.decompress(base64.b64decode(match.group(1))).decode('utf-8')
          path.write_text(html, encoding='utf-8')
          print('Beta Classic unpacked:', len(html), 'characters')
          PY
      - name: Commit plain HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beta-classic.html
          if git diff --cached --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git commit -m "Replace compressed Beta Classic wrapper with plain HTML"
          git push