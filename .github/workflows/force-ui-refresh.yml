name: Force UI refresh

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch cache keys and install access gate
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "20260724-6"
          access_tag = f'<script src="access.js?v={version}"></script>'

          for p in Path('.').glob('*.html'):
              s = p.read_text(encoding='utf-8')

              if p.name == 'index.html':
                  s = re.sub(r'<script src="telegram\.js(?:\?v=[^"]*)?"></script>',
                             f'<script src="telegram.js?v={version}"></script>', s)
                  s = s.replace('data-app-tab="pro">PRO</button>',
                                'data-app-tab="pro">⚡ PRO</button>')

              s = re.sub(r'<script src="access\.js(?:\?v=[^"]*)?"></script>', access_tag, s)
              if 'src="access.js' not in s:
                  s = s.replace('</head>', access_tag + '</head>', 1)

              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          if git diff --cached --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git commit -m "Install trial access gate and refresh UI cache"
          git push
