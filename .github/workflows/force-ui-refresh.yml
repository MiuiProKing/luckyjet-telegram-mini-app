name: Build mini app pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install modules, restore Beta Classic and refresh cache
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import base64
          import gzip

          version = "20260724-32"
          lucky_api = "https://crash-gateway-grm-cr.100hp.app/state"
          lucky_customer = "077dee8d-c923-4c02-9bee-757573662e69"
          lucky_session = "933841e0-8e4f-4513-9ef1-852096c0e566"

          global_modules = [
              "app-config.js",
              "i18n-runtime.js",
              "language-onboarding.js",
              "license-client.js",
              "access.js",
              "analytics-client.js",
              "app-center.js",
          ]
          all_known_modules = ["owner-tools.js", *global_modules]
          obsolete_names = ["i18n.js", "admin-devices.js", "admin-auth-bridge.js"]

          def remove_module(s, name):
              pattern = rf'<script\s+src="{re.escape(name)}(?:\?v=[^"]*)?"></script>'
              return re.sub(pattern, "", s, flags=re.I)

          def sync_luckyjet_connection(s):
              lower = s.lower()
              if not ("lucky" in lower and "jet" in lower):
                  return s
              if not any(token in lower for token in ("stopcoefficients", "currentcoefficients", "fetchstopcoefficient", "crash-gateway")):
                  return s
              s = re.sub(r'https://crash-gateway[^\s"\'`<>]+/state', lucky_api, s, flags=re.I)
              s = re.sub(r'(["\']customer-id["\']\s*:\s*)["\'][^"\']*["\']', lambda m: m.group(1) + '"' + lucky_customer + '"', s, flags=re.I)
              s = re.sub(r'(["\']session-id["\']\s*:\s*)["\'][^"\']*["\']', lambda m: m.group(1) + '"' + lucky_session + '"', s, flags=re.I)
              return s

          payload = Path('beta-classic.payload.b64')
          beta_path = Path('beta-classic.html')
          if payload.exists():
              beta_html = gzip.decompress(base64.b64decode(payload.read_text(encoding='utf-8').strip())).decode('utf-8')
              beta_path.write_text(beta_html, encoding='utf-8')
              print('Beta Classic restored from payload:', len(beta_html), 'characters')

          beta_card = '''
                <button class="game-card has-art" type="button" data-open-pro="luckyjet-beta" aria-label="Open Lucky Jet Beta PRO">
                  <img class="card-art" src="pro-luckyjet.jpg" alt="Lucky Jet Beta">
                  <span class="pro-badge">BETA</span>
                  <span class="card-copy"><span class="card-name">LUCKY JET BETA</span><span class="card-studio">NEW LIVE CONNECTION</span></span>
                </button>'''

          for p in Path('.').glob('*.html'):
              if p.name == 'setup-server.html':
                  continue

              s = p.read_text(encoding='utf-8')
              if p.name != 'beta-classic.html':
                  s = sync_luckyjet_connection(s)

              if p.name == 'index.html':
                  s = re.sub(r'<script src="telegram\.js(?:\?v=[^"]*)?"></script>', f'<script src="telegram.js?v={version}"></script>', s, flags=re.I)
                  s = s.replace('data-app-tab="pro">PRO</button>', 'data-app-tab="pro">⚡ PRO</button>')
                  if 'data-open-pro="luckyjet-beta"' not in s:
                      pattern = r'(<button class="game-card has-art" type="button" data-open-pro="rocketqueen"[\s\S]*?</button>)'
                      s, count = re.subn(pattern, lambda m: m.group(1) + beta_card, s, count=1)
                      if count == 0:
                          raise RuntimeError('PRO Rocket Queen card marker was not found')
                  handler = '  document.querySelector(\'[data-open-pro="luckyjet-beta"]\').addEventListener("click", () => { window.location.href = "beta-luckyjet.html"; });'
                  if 'window.location.href = "beta-luckyjet.html"' not in s:
                      marker = '  document.querySelector(\'[data-open-pro="rocketqueen"]\').addEventListener("click", () => { window.location.href = "pro-rocketqueen.html"; });'
                      if marker not in s:
                          raise RuntimeError('PRO handler marker was not found')
                      s = s.replace(marker, marker + '\n' + handler, 1)

              for name in all_known_modules + obsolete_names:
                  s = remove_module(s, name)

              if p.name == 'admin.html':
                  if 'http-equiv="Cache-Control"' not in s:
                      s = s.replace('<meta name="theme-color" content="#07050b">', '<meta name="theme-color" content="#07050b">\n  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n  <meta http-equiv="Pragma" content="no-cache">\n  <meta http-equiv="Expires" content="0">', 1)
                  bundle = (f'<script src="owner-tools.js?v={version}"></script>' f'<script src="app-config.js?v={version}"></script>' f'<script src="admin-auth-bridge.js?v={version}"></script>' f'<script src="i18n-runtime.js?v={version}"></script>' f'<script src="admin-devices.js?v={version}"></script>')
              elif p.name == 'index.html':
                  bundle = f'<script src="owner-tools.js?v={version}"></script>' + ''.join(f'<script src="{name}?v={version}"></script>' for name in global_modules)
              else:
                  bundle = ''.join(f'<script src="{name}?v={version}"></script>' for name in global_modules)

              s = s.replace('</head>', bundle + '</head>', 1)
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit generated page updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          if git diff --cached --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git commit -m "Restore plain Beta Classic HTML and refresh cache"
          git push
