name: Install owner admin entry

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-owner-entry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add owner tools to pages
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "20260724-18"
          tag = f'<script src="owner-tools.js?v={version}"></script>'

          for path in Path('.').glob('*.html'):
              text = path.read_text(encoding='utf-8')
              text = re.sub(r'<script\s+src="owner-tools\.js(?:\?v=[^"]*)?"></script>', '', text, flags=re.I)
              text = text.replace('</head>', tag + '</head>', 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit owner entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          if git diff --cached --quiet; then
            echo "No owner entry changes needed"
            exit 0
          fi
          git commit -m "Install owner-only admin entry"
          git push
