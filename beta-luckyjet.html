<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#05050a">
<title>Lucky Jet Beta — AllPredictor</title>
<style>
:root{--bg:#05050a;--card:#11111a;--line:#292938;--text:#fff;--muted:#9494a8;--violet:#8b5cf6;--blue:#367de7;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}*{box-sizing:border-box}body{margin:0;min-height:100vh;padding:calc(16px + env(safe-area-inset-top)) 14px calc(92px + env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#21113f 0,#090811 35%,var(--bg) 70%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}.app{width:min(680px,100%);margin:auto}.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}.back{width:44px;height:44px;border:1px solid var(--line);border-radius:14px;background:#171720;color:#fff;font-size:20px}.heading{flex:1}.heading h1{margin:0;font-size:21px;letter-spacing:1.5px}.heading h1 span{color:#7aa7ff}.sub{margin-top:3px;color:var(--muted);font-size:11px}.tag{padding:7px 10px;border-radius:999px;background:linear-gradient(135deg,#fde047,#fb923c);color:#251400;font-size:9px;font-weight:1000}.status-card,.chart,.stats,.controls,.history{margin-bottom:11px;padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(17,17,26,.88);box-shadow:0 14px 34px rgba(0,0,0,.25)}.status-row{display:flex;align-items:center;gap:10px}.dot{width:10px;height:10px;border-radius:50%;background:var(--yellow);box-shadow:0 0 14px currentColor}.dot.ok{background:var(--green)}.dot.bad{background:var(--red)}.status-main{font-size:13px;font-weight:900}.status-sub{margin-top:3px;color:var(--muted);font-size:11px}.circle{width:210px;height:210px;margin:18px auto;position:relative;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,#080811 43%,#171027 45%,#080811 72%);box-shadow:inset 0 0 35px rgba(139,92,246,.35),0 0 42px rgba(54,125,231,.14)}.circle:before{content:"";position:absolute;inset:5px;border-radius:50%;background:conic-gradient(transparent,#8b5cf6,#367de7,transparent 42%);animation:spin 4s linear infinite;-webkit-mask:radial-gradient(circle,transparent 67%,#000 69%);mask:radial-gradient(circle,transparent 67%,#000 69%)}@keyframes spin{to{transform:rotate(360deg)}}.target{text-align:center;z-index:1}.target strong{display:block;font-size:32px;color:#74ffae;text-shadow:0 0 18px rgba(16,185,129,.4)}.target small{display:block;margin-top:6px;color:var(--muted);font-size:11px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.stat{padding:10px;border-radius:13px;background:#090910;text-align:center}.stat label{display:block;color:var(--muted);font-size:9px;text-transform:uppercase}.stat b{display:block;margin-top:5px;font-size:16px}.bars{height:68px;display:flex;align-items:flex-end;gap:5px}.bar-wrap{flex:1;text-align:center}.bar{min-height:4px;border-radius:4px 4px 0 0;background:var(--blue)}.bar.low{background:var(--red)}.bar.mid{background:var(--yellow)}.bar.high{background:var(--green)}.bar-label{margin-top:4px;color:var(--muted);font-size:8px}.controls{display:grid;gap:9px}.range{display:grid;grid-template-columns:1fr 1fr;gap:8px}.field{height:45px;padding:0 11px;border:1px solid var(--line);border-radius:13px;background:#090910;color:#fff;font-weight:800}.btn{height:50px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--blue),#2252a3);color:#fff;font-weight:1000;letter-spacing:.8px}.btn.auto{background:linear-gradient(135deg,#7c3aed,#4c1d95)}.btn.auto.on{background:linear-gradient(135deg,var(--green),#047857)}.btn:disabled{opacity:.5}.message{min-height:35px;padding:10px 12px;border-radius:12px;background:#090910;color:#d7d7e5;font-size:11px;line-height:1.45}.history-list{display:flex;gap:7px;overflow-x:auto}.chip{min-width:65px;padding:8px;border-radius:10px;background:#171724;text-align:center;font-size:10px}.chip b{display:block;font-size:12px}.footer-note{color:#77778a;font-size:9px;text-align:center;line-height:1.5}@media(max-width:380px){.circle{width:185px;height:185px}.target strong{font-size:28px}.stats{gap:5px}.stat{padding:9px 5px}}
</style>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<main class="app">
  <header class="top"><button class="back" id="back">‹</button><div class="heading"><h1>LUCKY <span>JET</span></h1><div class="sub">BETA LIVE ANALYSIS • @V0xFF3</div></div><div class="tag">BETA</div></header>
  <section class="status-card"><div class="status-row"><div class="dot" id="apiDot"></div><div><div class="status-main" id="apiTitle">Подключение к LIVE API…</div><div class="status-sub" id="apiSub">Ожидание первого завершённого раунда</div></div></div></section>
  <section class="chart"><div class="bars" id="bars"></div></section>
  <div class="circle"><div class="target"><strong id="target">0.00X</strong><small id="targetLabel">Сбор данных 0/10</small></div></div>
  <section class="stats"><div class="stat"><label>Последний</label><b id="last">—</b></div><div class="stat"><label>Раунд</label><b id="round">0/3</b></div><div class="stat"><label>Время</label><b id="time">--:--</b></div></section>
  <section class="controls"><div class="range"><input class="field" id="min" type="number" step="0.1" min="1.1" value="2"><input class="field" id="max" type="number" step="0.1" min="1.2" value="8"></div><button class="btn" id="signal">ПОЛУЧИТЬ ПРОГНОЗ</button><button class="btn auto" id="auto">АВТОМАТИЧЕСКИЙ</button><div class="message" id="message">Собираю первые 10 коэффициентов для анализа.</div></section>
  <section class="history"><div class="history-list" id="history"></div></section>
  <div class="footer-note">Статистический анализ не гарантирует выигрыш. Результат каждого игрового раунда заранее неизвестен.</div>
</main>
<script>
(()=>{"use strict";
const API_URL="https://crash-gateway-grm-cr.100hp.app/state";
const API_HEADERS={"customer-id":"077dee8d-c923-4c02-9bee-757573662e69","session-id":"933841e0-8e4f-4513-9ef1-852096c0e566","accept":"application/json"};
const MIN_HISTORY=10,MAX_HISTORY=40,POLL_MS=3500;
const $=id=>document.getElementById(id),coefs=[];
let lastRoundKey="",polling=false,auto=false,active=null;
const els={dot:$("apiDot"),title:$("apiTitle"),sub:$("apiSub"),bars:$("bars"),target:$("target"),label:$("targetLabel"),last:$("last"),round:$("round"),time:$("time"),min:$("min"),max:$("max"),signal:$("signal"),auto:$("auto"),message:$("message"),history:$("history")};
function setMessage(text){els.message.textContent=text}
function normalize(v){const n=Number(v);return Number.isFinite(n)&&n>=1?Number((n===1?1.01:n).toFixed(2)):null}
function extract(data){const values=[data?.stopCoefficients?.[0],data?.currentCoefficients?.[0],data?.stopCoefficient,data?.coefficient];for(const value of values){const n=normalize(value);if(n!==null)return n}return null}
function roundKey(data,coef){return String(data?.roundConfig?.id||data?.roundId||data?.id||data?.provablyFair?.hash||coef)}
async function fetchCoef(){const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),8000);try{const response=await fetch(API_URL,{headers:API_HEADERS,cache:"no-store",signal:controller.signal});if(!response.ok)throw new Error("HTTP "+response.status);const data=await response.json();return{coef:extract(data),key:roundKey(data,extract(data)),data}}finally{clearTimeout(timer)}}
function render(){els.label.textContent=coefs.length<MIN_HISTORY?`Сбор данных ${coefs.length}/${MIN_HISTORY}`:"Анализ готов";els.bars.innerHTML=coefs.slice(-10).map(c=>{const max=Math.max(3,...coefs.slice(-10)),h=Math.max(5,Math.min(64,c/max*64)),cls=c<1.5?"low":c<2?"mid":"high";return`<div class="bar-wrap"><div class="bar ${cls}" style="height:${h}px"></div><div class="bar-label">${c.toFixed(1)}</div></div>`}).join("");els.history.innerHTML=coefs.slice(-12).reverse().map(c=>`<div class="chip"><b>${c.toFixed(2)}X</b>${c<1.5?"LOW":c>=5?"HIGH":"MID"}</div>`).join("")}
function median(arr){const s=[...arr].sort((a,b)=>a-b),m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}
function calculateTarget(){const recent=coefs.slice(-MIN_HISTORY),min=Math.max(1.1,Number(els.min.value)||2),max=Math.max(min+.1,Number(els.max.value)||8),med=median(recent),avg=recent.reduce((a,b)=>a+b,0)/recent.length,low=recent.filter(x=>x<1.5).length/MIN_HISTORY,vol=Math.max(...recent)-Math.min(...recent);let raw=med*.55+avg*.25+(low>=.5?.45:.15)+(vol>4?.25:0);raw=Math.max(min,Math.min(max,raw));return Number(raw.toFixed(2))}
function canSignal(){if(coefs.length<MIN_HISTORY)return{ok:false,reason:`Нужно ещё ${MIN_HISTORY-coefs.length} коэффициентов`};const recent=coefs.slice(-5),low=recent.filter(x=>x<1.5).length,avg=recent.reduce((a,b)=>a+b,0)/recent.length;if(low>=2||avg<2.2)return{ok:true,reason:"Накоплена серия низких коэффициентов"};return{ok:false,reason:"Рынок пока не дал подходящего статистического окна"}}
function createSignal(){const check=canSignal();if(!check.ok){setMessage(check.reason);return false}const target=calculateTarget(),now=new Date();active={target,round:0,skip:true};els.target.textContent=target.toFixed(2)+"X";els.label.textContent="Цель на следующие 3 раунда";els.time.textContent=now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});els.round.textContent="0/3";setMessage(`Прогноз: ${target.toFixed(2)}X. Первый новый раунд пропускается, затем проверяются 3 раунда.`);return true}
function verify(coef){if(!active)return;if(active.skip){active.skip=false;setMessage(`Текущий раунд ${coef.toFixed(2)}X пропущен. Начинаю проверку.`);return}active.round++;els.round.textContent=active.round+"/3";if(coef>=active.target){setMessage(`✅ Прогноз ${active.target.toFixed(2)}X подтверждён на раунде ${active.round}.`);active=null;if(auto)setTimeout(()=>createSignal(),2500)}else if(active.round>=3){setMessage(`❌ Цель не достигнута за 3 раунда. Последний: ${coef.toFixed(2)}X.`);active=null;if(auto)setTimeout(()=>createSignal(),4000)}else setMessage(`Раунд ${active.round}/3: ${coef.toFixed(2)}X. Жду следующий.`)}
async function poll(){if(polling)return;polling=true;try{const result=await fetchCoef();if(result.coef===null)throw new Error("Нет stopCoefficients");els.dot.className="dot ok";els.title.textContent="LIVE API подключён";els.sub.textContent="Получаю завершённые раунды Lucky Jet";if(result.key!==lastRoundKey){lastRoundKey=result.key;coefs.push(result.coef);if(coefs.length>MAX_HISTORY)coefs.shift();els.last.textContent=result.coef.toFixed(2)+"X";render();verify(result.coef);if(auto&&!active)createSignal()}}catch(error){els.dot.className="dot bad";els.title.textContent="Ошибка LIVE API";els.sub.textContent=error.name==="AbortError"?"Превышено время ожидания":error.message;console.error(error)}finally{polling=false}}
els.signal.addEventListener("click",createSignal);els.auto.addEventListener("click",()=>{auto=!auto;els.auto.classList.toggle("on",auto);els.auto.textContent=auto?"АВТО: ВКЛ":"АВТОМАТИЧЕСКИЙ";setMessage(auto?"Автоматический анализ включён.":"Автоматический анализ выключен.");if(auto&&!active)createSignal()});$("back").addEventListener("click",()=>location.href="index.html#pro");
try{Telegram.WebApp.ready();Telegram.WebApp.expand()}catch(_){ }
render();poll();setInterval(poll,POLL_MS);
})();
</script>
</body>
</html>
