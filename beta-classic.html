<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LuckyJet Beta Classic</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#0f1525;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}body{display:grid;place-items:center;padding:22px}.loader{text-align:center}.spinner{width:42px;height:42px;margin:0 auto 16px;border:3px solid rgba(255,255,255,.12);border-top-color:#8b5cf6;border-radius:50%;animation:spin .8s linear infinite}.message{font-size:16px}.error{max-width:560px;color:#ffd36a;line-height:1.55}.retry{display:none;margin:18px auto 0;padding:12px 22px;border:0;border-radius:13px;background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;font-weight:900}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
  <main class="loader">
    <div class="spinner" id="spinner"></div>
    <div class="message" id="message">Загрузка LuckyJet Beta Classic…</div>
    <button class="retry" id="retry" type="button">ПОВТОРИТЬ</button>
  </main>
  <script>
    (() => {
      const message = document.getElementById('message');
      const spinner = document.getElementById('spinner');
      const retry = document.getElementById('retry');

      function fail(text) {
        spinner.style.display = 'none';
        message.className = 'message error';
        message.textContent = text;
        retry.style.display = 'block';
      }

      async function load() {
        retry.style.display = 'none';
        spinner.style.display = 'block';
        message.className = 'message';
        message.textContent = 'Загрузка LuckyJet Beta Classic…';
        try {
          if (!window.pako || typeof window.pako.ungzip !== 'function') {
            throw new Error('Не загрузился модуль распаковки');
          }
          const response = await fetch('beta-classic.payload.b64?v=20260724-33', { cache: 'no-store' });
          if (!response.ok) throw new Error('Payload HTTP ' + response.status);
          const encoded = (await response.text()).trim();
          const binary = atob(encoded);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          const html = window.pako.ungzip(bytes, { to: 'string' });
          if (!html || !html.includes('<html')) throw new Error('Получен пустой HTML');
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          console.error(error);
          fail('Ошибка загрузки Beta Classic: ' + (error?.message || String(error)));
        }
      }

      retry.addEventListener('click', load);
      load();
    })();
  </script>
</body>
</html>
